name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README stats
        run: python scripts/github_stats.py
        env:
          # Use a Personal Access Token for full stats (incl. private contributions).
          # Falls back to the built-in token for public stats if STATS_TOKEN is unset.
          GH_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          STATS_USERNAME: rohitshidid

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: refresh GitHub stats" && git push)
